version: "3,.9"

services:
  server:
    build: ./server
    container_name: fullstack-server
    ports:
      - "5000:5000"
    networks:
      - fullstack-network
    restart: unless-stopped  
  client:
    build: ./client
    container_name: fullstack-client
    ports:
      - "5174:3000"
    networks:
      - fullstack-network  
    depends_on:
      - server
    restart: unless-stopped  

networks:
  fullstack-network:
    driver: bridge